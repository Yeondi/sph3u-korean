                    <p>회로가 두 개의 병렬(parallel) 경로로 분기됩니다. 한 경로에는 저항기 2가 있습니다. 다른 경로에는 0.05암페어의 전류(current)가 흐르는 저항기 3이 있습니다. 경로들이 합류한 후 8옴의 저항을 가진 저항기 4를 통과하여 전지로 돌아갑니다.</p>
