                    <p>9.0볼트 전지가 직렬(series)로 저항기(resistor) 1에 연결되어 있습니다. 저항기 1은 10.0옴입니다.</p>
                    <p>저항기 1 이후 3개의 병렬(parallel) 경로가 있습니다. 첫 번째 경로에는 20.0옴의 저항기 2를 통해 0.15암페어가 흐릅니다. 두 번째 경로에는 저항기 3을 통해 0.20암페어가 흐릅니다. 세 번째 경로는 12옴의 저항기 4를 통과합니다. </p>
