        <div id="instructions">
            <h1><span data-lang-id="title" data-lang-processed="false"></span></h1>
            <p>물체의 무게(weight)는 물체에 작용하는 중력(gravity)에 따라 달라집니다. 각 줄에 같은 질량(mass)을 추가한 다음, 서로 다른 중력을 가진 표면(지구, 달, 목성)을 선택하여 중력의 세기를 조정하고, 주어진 질량의 무게가 어떻게 변하는지 관찰하세요.</p>
            <dl>
                <dt>질량(Mass)</dt>
                <dd>물질이 포함하고 있는 양의 측정값</dd>
                <dt>무게(Weight)</dt>
                <dd>물체에 대한 중력의 당김의 측정값</dd>
                <dt>힘(Force) = 질량(mass) x 중력(gravity)</dt>
            </dl>
            <!-- <h2>Mass</h2>
            <p>measurement of the amount of matter something contains</p>
            <h2>Weight</h2>
            <p>measurement of the pull of gravity on an object</p>
            <h2>Force = mass x gravity</h2> -->

        </div>
